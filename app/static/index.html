<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSL Certificate Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
    .input-area { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
    .input-area:focus { border-color: rgba(99,102,241,0.5); outline: none; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); }
    .btn-primary:hover { background: linear-gradient(135deg, #818cf8, #6366f1); }
    .badge-ok { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .badge-expired { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .badge-warning { background: rgba(234,179,8,0.15); color: #facc15; border: 1px solid rgba(234,179,8,0.3); }
    .section-title { font-size: 11px; font-weight: 500; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .info-row { display: flex; justify-content: space-between; gap: 12px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 11px; color: #64748b; flex-shrink: 0; }
    .info-value { font-size: 11px; color: #cbd5e1; font-family: ui-monospace, monospace; text-align: right; word-break: break-all; }
    .ext-row { display: flex; justify-content: space-between; gap: 8px; padding: 2px 0; }
    .ext-name { font-size: 11px; color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ext-flag { font-size: 11px; flex-shrink: 0; color: #475569; }
    .ext-flag.critical { color: #facc15; }
    .san-tag { font-size: 11px; font-family: ui-monospace, monospace; color: #cbd5e1; margin-right: 16px; }
    .results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .bottom-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 16px; }
    .bottom-grid.single { grid-template-columns: 1fr; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.3s ease-out; }
  </style>
</head>
<body class="h-screen overflow-hidden text-white">
  <div id="app" class="h-full flex flex-col px-8 py-5 max-w-[1800px] mx-auto w-full">
    <header id="header" class="shrink-0 text-center mb-4">
      <div class="flex items-center justify-center gap-3">
        <img src="/logo.svg" alt="" class="h-9 w-9 shrink-0" width="36" height="36">
        <h1 class="text-xl font-semibold tracking-tight">
          <span class="text-indigo-400">SSL</span> Certificate Checker
        </h1>
      </div>
      <p class="text-slate-500 text-xs mt-1">Paste a PEM-encoded SSL/TLS certificate to inspect its details</p>
    </header>

    <p id="error-msg" class="text-red-400 text-xs text-center mb-3 hidden shrink-0"></p>

    <div id="input-section" class="flex-1 flex flex-col justify-center max-w-2xl mx-auto w-full">
      <div class="card rounded-2xl p-6">
        <textarea id="pem-input" class="input-area w-full h-40 rounded-xl px-4 py-3 text-sm font-mono text-slate-300 resize-none" placeholder="-----BEGIN CERTIFICATE-----
MIIExample...
-----END CERTIFICATE-----"></textarea>
        <button id="parse-btn" onclick="parseCert()" class="btn-primary w-full mt-4 py-2.5 rounded-xl text-sm font-medium transition-all">
          Parse Certificate
        </button>
      </div>
    </div>

    <div id="result-section" class="hidden flex-1 flex flex-col animate-in">
      <div class="flex items-center gap-3 mb-3 shrink-0">
        <h2 class="text-base font-medium">Certificate Info</h2>
        <span id="status-badge" class="px-2.5 py-0.5 rounded-full text-xs font-medium"></span>
      </div>

      <div class="results-grid">
        <div class="card rounded-xl p-4">
          <div class="section-title">Subject & Validity</div>
          <div id="col-subject"></div>
        </div>
        <div class="card rounded-xl p-4">
          <div class="section-title">Issuer & Identity</div>
          <div id="col-issuer"></div>
        </div>
        <div class="card rounded-xl p-4">
          <div class="section-title">Cryptography</div>
          <div id="col-crypto"></div>
        </div>
      </div>

      <div id="bottom-grid" class="bottom-grid">
        <div id="san-section" class="card rounded-xl p-4 hidden">
          <div class="section-title">Subject Alternative Names</div>
          <div id="san-list"></div>
        </div>
        <div id="extensions-section" class="card rounded-xl p-4">
          <div class="section-title">Extensions</div>
          <div id="extensions-list" style="display:grid;grid-template-columns:repeat(2,1fr);gap:0 24px;"></div>
        </div>
      </div>

      <div class="mt-6 flex justify-center shrink-0">
        <button onclick="reset()" class="btn-primary w-1/4 py-3 rounded-xl text-sm font-medium transition-all">
          Check Another Certificate
        </button>
      </div>
    </div>
  </div>
  <script src="/app.js?v=3"></script>
</body>
</html>
