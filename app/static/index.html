<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSL Cert Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
    .input-area { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
    .input-area:focus { border-color: rgba(99,102,241,0.5); outline: none; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); }
    .btn-primary:hover { background: linear-gradient(135deg, #818cf8, #6366f1); }
    .badge-ok { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .badge-expired { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .badge-warning { background: rgba(234,179,8,0.15); color: #facc15; border: 1px solid rgba(234,179,8,0.3); }
    .info-row { border-bottom: 1px solid rgba(255,255,255,0.05); }
    .info-row:last-child { border-bottom: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.3s ease-out; }
  </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center p-4">
  <div class="w-full max-w-2xl">
    <div class="text-center mb-8">
      <div class="flex items-center justify-center gap-3 mb-2">
        <img src="/logo.svg" alt="" class="h-10 w-10 shrink-0" width="40" height="40">
        <h1 class="text-2xl font-semibold tracking-tight">SSL Cert Checker</h1>
      </div>
      <p class="text-slate-500 text-sm mt-1">Paste a PEM-encoded certificate to inspect its details</p>
    </div>

    <div id="input-section" class="card rounded-2xl p-6">
      <textarea id="pem-input" class="input-area w-full h-48 rounded-xl px-4 py-3 text-sm font-mono text-slate-300 resize-none" placeholder="-----BEGIN CERTIFICATE-----
MIIExample...
-----END CERTIFICATE-----"></textarea>
      <button id="parse-btn" onclick="parseCert()" class="btn-primary w-full mt-4 py-2.5 rounded-xl text-sm font-medium transition-all">
        Parse Certificate
      </button>
      <p id="error-msg" class="text-red-400 text-xs mt-3 hidden"></p>
    </div>

    <div id="result-section" class="hidden animate-in mt-6">
      <div class="card rounded-2xl p-6 space-y-4">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-medium">Certificate Info</h2>
          <span id="status-badge" class="px-3 py-1 rounded-full text-xs font-medium"></span>
        </div>

        <div id="cert-details" class="space-y-0"></div>
      </div>

      <div id="san-section" class="card rounded-2xl p-6 mt-4 hidden">
        <h3 class="text-sm font-medium text-slate-400 mb-3">Subject Alternative Names</h3>
        <div id="san-list" class="space-y-1"></div>
      </div>

      <div id="extensions-section" class="card rounded-2xl p-6 mt-4">
        <h3 class="text-sm font-medium text-slate-400 mb-3">Extensions</h3>
        <div id="extensions-list" class="space-y-1"></div>
      </div>

      <button onclick="reset()" class="w-full mt-4 border border-white/[0.1] hover:border-white/[0.2] hover:bg-white/[0.03] py-2.5 rounded-xl text-sm font-medium transition-all">
        Check another certificate
      </button>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
